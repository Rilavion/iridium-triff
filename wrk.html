<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В разработке...</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Jura:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .background-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 20%;
            transform: scale(1.00);
            transform-origin: center center;
            filter: brightness(0.7) saturate(0.9);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.5) 100%);
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: radial-gradient(ellipse 55% 45% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
        }

        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star.blue {
            background: #aaccff;
            box-shadow: 0 0 6px rgba(150, 180, 255, 0.8);
        }

        .star.gold {
            background: #ffd080;
            box-shadow: 0 0 6px rgba(255, 200, 100, 0.8);
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .message-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .message-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(100, 150, 255, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .message-icon {
            font-size: 3rem;
            color: rgba(150, 200, 255, 0.8);
            animation: iconFloat 3s ease-in-out infinite, iconGlow 2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        @keyframes iconGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(100, 180, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(100, 180, 255, 0.9)); }
        }

        .message {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: transparent;
            background: linear-gradient(180deg, 
                #ffffff 0%,
                #a0c0ff 30%,
                #6090d0 60%,
                #4070b0 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            position: relative;
            animation: textAppear 2s ease-out forwards;
            opacity: 0;
        }

        .message::before {
            content: 'В разработке...';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #ffffff 0%,
                #a0c0ff 30%,
                #6090d0 60%,
                #4070b0 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: blur(8px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes textAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .subtitle {
            font-family: 'Jura', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            color: rgba(150, 180, 220, 0.6);
            text-transform: uppercase;
            animation: subtitleAppear 2s ease-out 0.5s forwards;
            opacity: 0;
        }

        @keyframes subtitleAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            animation: barAppear 2s ease-out 1s forwards;
            opacity: 0;
        }

        @keyframes barAppear {
            0% { opacity: 0; width: 0; }
            100% { opacity: 1; width: 200px; }
        }

        .loading-bar::before {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.8), transparent);
            animation: loadingMove 2s ease-in-out infinite;
        }

        @keyframes loadingMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(100, 150, 255, 0.1);
            border-radius: 50%;
            animation: orbitRotate 20s linear infinite;
            pointer-events: none;
        }

        .orbit-ring:nth-child(1) {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .orbit-ring:nth-child(2) {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 30s;
            animation-direction: reverse;
            border-color: rgba(100, 150, 255, 0.05);
        }

        @keyframes orbitRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(100, 180, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
        }

        .scan-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.02;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.4) 2px,
                rgba(0, 0, 0, 0.4) 4px
            );
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(100, 180, 255, 0.6);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="background-image">
        <img src="https://i.imgur.com/VZPb2iF.jpeg" alt="Background">
    </div>
    
    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="stars-layer" id="starsLayer"></div>
    <div class="particles" id="particles"></div>
    
    <div class="scan-lines"></div>
    
    <div class="content">
        <div class="orbit-ring">
            <div class="orbit-dot"></div>
        </div>
        <div class="orbit-ring"></div>
        
        <div class="message-container">
            <div class="message-glow"></div>
            <div class="message-icon">◈</div>
            <h1 class="message">В разработке...</h1>
            <p class="subtitle">Скоро здесь что-то появится</p>
            <div class="loading-bar"></div>
        </div>
    </div>

    <script>
        function createStars() {
            const container = document.getElementById('starsLayer');
            const starCount = 100;
            const types = ['', 'blue', 'gold'];

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                const type = types[Math.floor(Math.random() * types.length)];
                star.className = 'star' + (type ? ' ' + type : '');
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 4 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 25;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                particle.style.left = Math.random() * 100 + '%';
                
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                const duration = 15 + Math.random() * 20;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * -30 + 's';
                
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            createParticles();
        });
    </script>
</body>
</html>
